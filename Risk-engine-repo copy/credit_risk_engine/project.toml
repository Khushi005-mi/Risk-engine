[tool.poetry]
name = "credit-risk-engine"
version = "0.1.0"
description = "Deterministic batch credit risk scoring engine"
author = "Khushi Mishra"
packages = [{include = "credit-risk-engine" , from = "src}]
[tool.poetry.dependencies]
python = "^3.11"
pandas = "2.2.2"
numpy = "1.26.4"
scikit-learn = "1.4.2"
scipy = "1.13.1"
pyyaml = "6.0.1"
joblib = "1.4.2"

[tool.poetry.group.dev.dependencies]
pytest = "8.2.0"
black = "24.4.2"
isort = "5.13.2"
mypy = "1.10.0"
ruff = "0.4.4"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.black]
line-length = 88

[tool.isort]
profile = "black"

[tool.mypy]
strict = true